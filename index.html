<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <title>Trying programming by Ali Mohammed</title>
</head>
<body id="myBody" style="background-color: #1a1a1a; color: white; text-align: center; font-family: 'Cairo', sans-serif; padding-top: 50px; transition: 0.5s;">

    <img src="https://cdn-icons-png.flaticon.com/512/681/681494.png" style="width: 150px; border: 4px solid #00ff00; border-radius: 20px; margin-bottom: 20px;">

    <h1>أهلاً بك في عالم علاوي الورد ✌️🔥</h1>
    <p style="font-size: 1.2rem; color: #ccc;">Maybe this could be a new future for Ali</p>

    <button onclick="changeMagic()" style="padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none; background-color: #00ff00; color: black; font-weight: bold; box-shadow: 0 0 20px #00ff00;">
      Change the vibe ✨
    </button>

    <script>
        function changeMagic() {
            const colors = ['#ff4757', '#2e86de', '#2ecc71', '#f1c40f', '#8e44ad', '#1a1a1a', '#e91e63'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('myBody').style.backgroundColor = randomColor;
        }
    </script>

</body>
</html>
