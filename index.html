<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <title>للبيت, لاحلى بنيه, لمرتي,لحب حياتي, لام جهال, لرزونتي, لامي, لبنتي الاحبها💋💐✨</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: 0.8s;
            overflow: hidden;
        }
        .heart-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 20, 147, 0.4);
            text-align: center;
            max-width: 450px;
        }
        .main-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #ff1493;
            box-shadow: 0 0 20px #ff1493;
            margin-bottom: 20px;
            object-fit: cover;
        }
        h1 {
            color: #ff1493;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
        }
        .message {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .love-btn {
            background: #ff1493;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: 0.3s;
        }
        .love-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff1493;
        }
        /* تأثير القلوب الطائرة */
        .heart {
            position: absolute;
            color: #ff1493;
            font-size: 20px;
            animation: fly 3s linear forwards;
        }
        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body id="bg">

    <audio id="loveSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div class="heart-container">
        <img src="https://asset.bloomnation.com/c_pad,d_vendor:global:catalog:product:image.png,f_auto,fl_preserve_transparency,q_auto/v1768009312/vendor/6880/catalog/product/2/0/2025628135543_file_mdnesfjzh7yk2hx" class="main-img"> 
        
        <h1 id="headline">لاحلى مره بالدنيا 💗✨</h1>
        
        <div class="message">
            "حبيبتي رزونتي يا نور عيني يا عمر عمري يا حياة حياتي اعشقج واحبج وماكو بنيه تكدر تجي تبدل مكانج يا احلى بنيه بالدنيا" 🌹
        </div>

        <button class="love-btn" onclick="sendLove()">ادوسي اكثر من مره✨</button>
    </div>

    <script>
        function sendLove() {
            // تشغيل الصوت
            document.getElementById("loveSound").play();

            // تغيير لون الخلفية لدرجات الوردي
            const colors = ['#2c001e', '#4a0e2a', '#6d1c3c', '#121212'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = randomColor;

            // توليد قلوب طائرة
            for (let i = 0; i < 10; i++) {
                createHeart();
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 3000);
        }
    </script>
</body>
</html>
