<script>
    function changeMagic() {
        // 1. تشغيل الصوت
        var audio = document.getElementById("clickSound");
        audio.play();

        // 2. تغيير لون الخلفية (كودك القديم البطل)
        const colors = ['#ff4757', '#2e86de', '#2ecc71', '#f1c40f', '#8e44ad', '#1a1a1a', '#e91e63'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.getElementById('myBody').style.backgroundColor = randomColor;

        // 3. حركة بسيطة للزر (حتى يهتز من ينضغط)
        const btn = document.querySelector('button');
        btn.style.transform = "scale(0.9)";
        setTimeout(() => { btn.style.transform = "scale(1)"; }, 100);
    }
</script>
