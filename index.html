<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <title>موقع علاوي الورد</title>
</head>
<body id="myBody" style="background-color: #1a1a1a; color: white; text-align: center; font-family: 'Cairo', sans-serif; padding-top: 50px; transition: 0.5s;">

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <img src="https://substreammagazine.com/wp-content/uploads/2025/04/22f9637e-f41b-4ac2-8eff-b69a172491c9-1280x640.jpg" style="width: 200px; border: 4px solid #00ff00; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 0 15px #00ff00;">

    <h1 id="welcome-text">Ali's Future in Programming✌️🔥</h1>
    
    <p style="font-size: 1.2rem; color: #ccc;">Maybe this could be a new future for Ali</p>

    <button onclick="changeMagic()" style="padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none; background-color: #00ff00; color: black; font-weight: bold; box-shadow: 0 0 20px #00ff00; transition: 0.1s; outline: none;">
        غير الأجواء ✨
    </button>

    <script>
        // أول ما يفتح الموقع يطلب الاسم
        window.onload = function() {
            setTimeout(function() {
                let name = prompt("Ali's program");
                if (name != null && name != "") {
                    document.getElementById("welcome-text").innerHTML = "نورت الموقع يا " + name + " 🔥";
                }
            }, 500); // تأخير بسيط حتى تحمل الصفحة صح
        };

        function changeMagic() {
            var audio = document.getElementById("clickSound");
            audio.play().catch(function(e) { console.log("الصوت محظور حالياً"); });

            const colors = ['#ff4757', '#2e86de', '#2ecc71', '#f1c40f', '#8e44ad', '#1a1a1a', '#e91e63'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('myBody').style.backgroundColor = randomColor;

            const btn = document.querySelector('button');
            btn.style.transform = "scale(0.95)";
            setTimeout(() => { btn.style.transform = "scale(1)"; }, 100);
        }
    </script>

</body>
</html>
